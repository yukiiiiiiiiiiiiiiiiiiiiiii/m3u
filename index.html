<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机图片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
        }
        #img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
<img id="img" alt="">

<script>
// ======================================
// 你只需要在这里添加你的图片名字！
// ======================================
const landscapeImages = [
  "landscape/1.jpg"
  // 以后加图：直接加一行 "landscape/4.jpg"
];

const portraitImages = [
  "portrait/1.jpg"
  // 以后加图：直接加一行 "portrait/4.jpg"
];

// 自动判断横竖屏
const isLandscape = window.innerWidth > window.innerHeight;
const images = isLandscape ? landscapeImages : portraitImages;
const randomImg = images[Math.floor(Math.random() * images.length)];

// 显示图片
document.getElementById("img").src = randomImg;
</script>
</body>
</html>
